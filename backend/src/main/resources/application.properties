# ===================================================================
# DATASOURCE
# ===================================================================
spring.datasource.url=jdbc:mysql://10.2.22.163:3306/instagram_clone?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / HIBERNATE
# ===================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL57Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# SERVER
# ===================================================================
server.port=8080

# ===================================================================
# JWT
# ===================================================================
app.jwt.secret=${JWT_SECRET:YourSuperSecretKeyForJWTTokenGenerationInstagramClone2024!}
app.jwt.expiration-ms=86400000

# ===================================================================
# RABBITMQ
# ===================================================================
spring.rabbitmq.host=10.2.22.54
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# RabbitMQ Custom
app.rabbitmq.exchange=instagram.notifications
app.rabbitmq.queue=instagram.notifications.queue
app.rabbitmq.routing-key=notification.#

# ===================================================================
# FILE UPLOAD (if needed)
# ===================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
